<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; line-height: 1.6; color: #263238; background: #f6f7f4; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { background: #1f4d47; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0 0; color: #d9eee8; }
        .content { background: white; padding: 18px 20px 20px; border: 1px solid #e5e5e5; border-top: none; border-radius: 0 0 8px 8px; }
        .section { margin-bottom: 18px; }
        .section h2 { margin: 0 0 10px 0; font-size: 20px; color: #8a4b20; border-bottom: 2px solid #e7ded3; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #edf4ef; color: #24423d; font-weight: 600; text-align: left; padding: 12px 10px; border: 1px solid #dfe7e2; }
        td { padding: 10px; border: 1px solid #e3e7e4; color: #344440; }
        tr:nth-child(even) { background: #faf8f3; }
        .changes { background: #fff4df; border-left: 4px solid #c76f2a; padding: 15px; margin: 20px 0; border-radius: 4px; }
        .changes h3 { margin: 0 0 10px 0; color: #8a4b20; font-size: 16px; }
        .changes ul { margin: 0; padding-left: 20px; }
        .changes li { color: #8a4b20; margin: 5px 0; }
        .changed-row { background: #fff4df !important; font-weight: bold; }
        .changed-cell { color: #8a4b20; font-weight: bold; }
        .news-list { margin: 0; padding-left: 20px; }
        .news-list li { margin: 0 0 10px 0; color: #344440; }
        .news-list a { color: #0f766e; font-weight: normal; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Model Tracker - Daily Update</h1>
            <p>Date: {date}</p>
        </div>
        <div class="content">
            {news_section}

            <div class="section">
                <h2>AI Platforms</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Tool</th>
                            <th>Latest Model</th>
                            <th>Best For</th>
                            <th>Context Window</th>
                        </tr>
                    </thead>
                    <tbody>
                        {platforms_table}
                    </tbody>
                </table>
            </div>

            <div class="section">
                <h2>AI Coding Tools</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Tool</th>
                            <th>Latest Model</th>
                            <th>Best For</th>
                            <th>Context Window</th>
                        </tr>
                    </thead>
                    <tbody>
                        {coding_tools_table}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
