services:
  - type: web
    runtime: node
    name: youtube-top-videos
    rootDir: youtube-top-videos
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: NODE_VERSION
        value: 22
  - type: web
    runtime: static
    name: pyquiz-kb
    rootDir: python-mastery-quiz
    buildCommand: echo "No build needed"
    staticPublishPath: .
  - type: web
    runtime: static
    name: python-study-hub
    rootDir: python-study-hub
    buildCommand: echo "No build needed"
    staticPublishPath: .
